name: Generate Screenshots

on:
  # Called by release workflows after publishing
  workflow_call:
  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # Install VHS and dependencies manually (the VHS action has issues with ffmpeg)
      - name: Install VHS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          VHS_VERSION=$(curl -s https://api.github.com/repos/charmbracelet/vhs/releases/latest | jq -r '.tag_name')
          curl -LsSf "https://github.com/charmbracelet/vhs/releases/download/${VHS_VERSION}/vhs_${VHS_VERSION#v}_Linux_x86_64.tar.gz" -o /tmp/vhs.tar.gz
          mkdir -p /tmp/vhs-extract
          tar xzf /tmp/vhs.tar.gz -C /tmp/vhs-extract
          sudo mv $(find /tmp/vhs-extract -name 'vhs' -type f | head -1) /usr/local/bin/
          rm -rf /tmp/vhs.tar.gz /tmp/vhs-extract
          vhs --version

      # Builds the demo binary, seeds demo fixtures, and runs every tape in vhs/.
      - name: Generate screenshots
        run: make vhs

      - name: List generated files
        run: ls -la screenshots/

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7

      # Commit screenshots back to main
      - name: Commit updated screenshots
        run: |
          # Preserve generated screenshots before switching branches
          mkdir -p /tmp/screenshots_generated
          cp -r screenshots/* /tmp/screenshots_generated/

          # Releases run on tags; move to main to commit
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          cp -r /tmp/screenshots_generated/* screenshots/
          rm -rf /tmp/screenshots_generated

          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"

          git add screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes compared to main."
            exit 0
          fi

          CHANGED_FILES=$(git diff --staged --name-only -- screenshots/)
          COMMIT_MESSAGE=$(printf "chore: update screenshots [skip ci]\n\nThe following screenshots were updated:\n%s" "$CHANGED_FILES")
          git commit -m "$COMMIT_MESSAGE"

          for i in 1 2 3; do
            if git push origin main; then
              echo "Successfully pushed screenshots"
              exit 0
            fi
            echo "Push failed, attempt $i of 3. Pulling and retrying..."
            git pull --rebase origin main
          done

          echo "Failed to push after 3 attempts"
          exit 1
